<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator - CodeAlpha Task</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <main class="wrapper" role="main">
    <h1 class="app-title">Calculator <span>CodeAlpha Task</span></h1>

    <div class="calculator" role="application" aria-label="Calculator">

      <!-- Display -->
      <div class="display" aria-live="polite" aria-atomic="true">
        <div class="display__expression" id="expression" aria-label="Expression"></div>
        <div class="display__input"     id="input"      aria-label="Current input">0</div>
      </div>

      <!-- Button grid -->
      <div class="buttons" role="group" aria-label="Calculator buttons">

        <!-- Row 1: AC, C, %, ÷ -->
        <button class="btn btn--function" id="btn-ac"      aria-label="All clear">AC</button>
        <button class="btn btn--function" id="btn-c"       aria-label="Clear last">C</button>
        <button class="btn btn--function" id="btn-percent" aria-label="Percent">%</button>
        <button class="btn btn--operator" data-op="÷"      aria-label="Divide">÷</button>

        <!-- Row 2: 7, 8, 9, × -->
        <button class="btn btn--digit"   data-digit="7">7</button>
        <button class="btn btn--digit"   data-digit="8">8</button>
        <button class="btn btn--digit"   data-digit="9">9</button>
        <button class="btn btn--operator" data-op="×"      aria-label="Multiply">×</button>

        <!-- Row 3: 4, 5, 6, − -->
        <button class="btn btn--digit"   data-digit="4">4</button>
        <button class="btn btn--digit"   data-digit="5">5</button>
        <button class="btn btn--digit"   data-digit="6">6</button>
        <button class="btn btn--operator" data-op="−"      aria-label="Subtract">−</button>

        <!-- Row 4: 1, 2, 3, + -->
        <button class="btn btn--digit"   data-digit="1">1</button>
        <button class="btn btn--digit"   data-digit="2">2</button>
        <button class="btn btn--digit"   data-digit="3">3</button>
        <button class="btn btn--operator" data-op="+"      aria-label="Add">+</button>

        <!-- Row 5: +/−, 0, ., = -->
        <button class="btn btn--function" id="btn-sign"    aria-label="Toggle sign">+/−</button>
        <button class="btn btn--digit"   data-digit="0">0</button>
        <button class="btn btn--function" id="btn-dot"     aria-label="Decimal point">.</button>
        <button class="btn btn--equals"  id="btn-equals"   aria-label="Equals">=</button>

      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
